name: PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      
env:
  RG: rg-petclinic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: ./mvnw verify -B -q

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image
        run: |
          ACR=$(az acr list -g $RG --query "[0].name" -o tsv)
          az acr login --name $ACR
          IMAGE="${ACR}.azurecr.io/petclinic:$(echo ${{ github.sha }} | cut -c1-7)"
          docker build -t $IMAGE .
          docker push $IMAGE