name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  RG: rg-petclinic

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate version
        id: version
        run: |
          LAST=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
          echo "version=v${MAJOR}.$((MINOR + 1)).0" >> "$GITHUB_OUTPUT"

      - name: Tag & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image
        run: |
          ACR=$(az acr list -g $RG --query "[0].name" -o tsv)
          az acr login --name $ACR
          IMAGE="${ACR}.azurecr.io/petclinic:${{ steps.version.outputs.version }}"
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch infra values
        id: infra
        run: |
          echo "acr=$(az acr list -g $RG --query "[0].name" -o tsv)" >> "$GITHUB_OUTPUT"
          echo "mysql_host=$(az mysql flexible-server list -g $RG \
            --query "[0].fullyQualifiedDomainName" -o tsv)" >> "$GITHUB_OUTPUT"
          echo "mysql_user=$(az mysql flexible-server list -g $RG \
            --query "[0].administratorLogin" -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy via VM managed identity
        env:
          VERSION:    ${{ needs.release.outputs.version }}
          ACR:        ${{ steps.infra.outputs.acr }}
          MYSQL_HOST: ${{ steps.infra.outputs.mysql_host }}
          MYSQL_USER: ${{ steps.infra.outputs.mysql_user }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          az vm run-command invoke \
            --resource-group $RG \
            --name vm-petclinic \
            --command-id RunShellScript \
            --scripts "
              az login --identity --allow-no-subscriptions
              az acr login --name ${ACR}
              docker stop petclinic 2>/dev/null || true
              docker rm   petclinic 2>/dev/null || true
              docker pull ${ACR}.azurecr.io/petclinic:${VERSION}
              docker run -d \
                --name petclinic \
                --restart unless-stopped \
                -p 8080:8080 \
                -e SPRING_PROFILES_ACTIVE=mysql \
                -e MYSQL_URL='jdbc:mysql://${MYSQL_HOST}:3306/petclinic' \
                -e MYSQL_USER='${MYSQL_USER}' \
                -e MYSQL_PASS='${MYSQL_PASS}' \
                ${ACR}.azurecr.io/petclinic:${VERSION}
            "